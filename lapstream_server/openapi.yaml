openapi: 3.0.3
info:
  title: LapStream API
  version: 1.0.0
  description: API for device authentication, player registration, and lane assignment.
servers:
  - url: "http://localhost:4000"
    description: Local development server
paths:
  /:
    get:
      tags: [health]
      summary: Service info
      description: Returns basic service information.
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceInfo"

  /auth/admin/otp:
    post:
      tags: [auth]
      summary: Generate enrollment OTPs
      description: |
        Generates one-time enrollment codes for devices.

        Requires admin token in the `Authorization` header:
        `Authorization: Bearer <ADMIN_API_TOKEN>`
      security:
        - adminToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/OtpClaim"
            example:
              - role: reception
                name: Frontdesk 1
              - role: lane_assign
                name: Lane Tablet 1
      responses:
        "200":
          description: OTPs generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeneratedOtp"
        "401":
          description: Missing or invalid admin token
          content:
            application/json:
              schema:
                oneOf:
                  - type: string
                    example: missing admin token
                  - type: string
                    example: Admin Token mismatch
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"

  /auth/device:
    post:
      tags: [auth]
      summary: Enroll device with OTP
      description: Enrolls a device and returns JWT + refresh token credentials.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  pattern: '^[0-9]{6}$'
            example:
              otp: "123456"
      responses:
        "200":
          description: Enrollment successful
          content:
            application/json:
              schema:
                type: object
                required: [status, data]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    $ref: "#/components/schemas/EnrolledDevice"
        "400":
          description: Enrollment failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"

  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotate credentials using refresh token
      description: Exchanges a refresh token for a new JWT and refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  minLength: 10
            example:
              refresh_token: "<refresh-token>"
      responses:
        "200":
          description: Credentials refreshed
          content:
            application/json:
              schema:
                type: object
                required: [status, data]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    $ref: "#/components/schemas/Credentials"
        "400":
          description: Invalid request format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
        "401":
          description: Invalid or reused refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"

  /player:
    post:
      tags: [players]
      summary: Register player
      description: Requires `reception` role (or `admin`).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, age]
              properties:
                name:
                  type: string
                age:
                  type: integer
            example:
              name: "Jane Doe"
              age: 27
      responses:
        "201":
          description: Player created
          content:
            application/json:
              schema:
                type: object
                required: [status, data]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    $ref: "#/components/schemas/Player"
        "403":
          description: Missing/invalid auth or wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
        "500":
          description: Invalid payload (current implementation behavior)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"

    get:
      tags: [players]
      summary: List players
      description: Requires `reception` role (or `admin`).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: object
                required: [status, data]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Player"
        "403":
          description: Missing/invalid auth or wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"

  /player/{id}:
    get:
      tags: [players]
      summary: Get player by ID
      description: Requires `reception` role (or `admin`).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player found (or null if missing)
          content:
            application/json:
              schema:
                type: object
                required: [status, data]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/Player"
        "400":
          description: Invalid ID parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
        "403":
          description: Missing/invalid auth or wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"

  /lane/pace-groups:
    get:
      tags: [lanes]
      summary: List configured pace groups
      description: Public endpoint. Returns server-configured pace groups and slot counts.
      responses:
        "200":
          description: Pace groups
          content:
            application/json:
              schema:
                type: object
                required: [status, data]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PaceGroup"

  /lane/{paceGroup}/{position}/player:
    put:
      tags: [lanes]
      summary: Assign player to lane slot
      description: Requires `lane_assign` role (or `admin`).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: paceGroup
          required: true
          schema:
            type: string
        - in: path
          name: position
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [player_id]
              properties:
                player_id:
                  type: integer
            example:
              player_id: 42
      responses:
        "200":
          description: Player assigned
          content:
            application/json:
              schema:
                type: object
                required: [status, data]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    $ref: "#/components/schemas/LaneSlot"
        "400":
          description: Invalid input or assignment failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
        "403":
          description: Missing/invalid auth or wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"

    delete:
      tags: [lanes]
      summary: Unassign player from lane slot
      description: |
        Requires `lane_assign` role (or `admin`).

        Endpoint exists in the current implementation, but the current handler wiring expects
        a player id parameter and may return `missing player ID` until that mismatch is fixed.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: paceGroup
          required: true
          schema:
            type: string
        - in: path
          name: position
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player unassigned
          content:
            application/json:
              schema:
                type: object
                required: [status, data]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  data:
                    $ref: "#/components/schemas/LaneSlot"
        "400":
          description: Unassignment failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"
        "403":
          description: Missing/invalid auth or wrong role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailureResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminToken:
      type: apiKey
      in: header
      name: Authorization

  schemas:
    Role:
      type: string
      enum: [admin, reception, lane_assign, lane_count]

    ServiceInfo:
      type: object
      required: [service, ok]
      properties:
        service:
          type: string
          example: lapstream-server
        ok:
          type: boolean
          example: true

    OtpClaim:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/Role"
        name:
          type: string

    GeneratedOtp:
      type: object
      required: [otp, role, deviceName, expiresAt]
      properties:
        otp:
          type: string
          example: "480942"
        role:
          $ref: "#/components/schemas/Role"
        deviceName:
          type: string
        expiresAt:
          type: string
          format: date-time

    Credentials:
      type: object
      required: [jwt, refresh_token]
      properties:
        jwt:
          type: string
        refresh_token:
          type: string

    EnrolledDevice:
      type: object
      required: [id, deviceName, role, registeredAt, credentials]
      properties:
        id:
          type: integer
        deviceName:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        registeredAt:
          type: string
          format: date-time
        credentials:
          $ref: "#/components/schemas/Credentials"

    Player:
      type: object
      required: [id, name, age]
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer

    LaneSlot:
      type: object
      required: [id, paceGroup, slotIndex]
      properties:
        id:
          type: integer
        paceGroup:
          type: string
        slotIndex:
          type: integer
        assignedPlayer:
          type: integer
          nullable: true

    PaceGroup:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer

    FailureResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [failure]
        err:
          type: string
